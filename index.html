document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

holder-count=\"3\">\n            <button sc-camel-on-click=\"{{ o.onPick }}\" style=\"flex:1;min-height:44px;border-radius:10px;font-size:16px;font-weight:700;border:1px solid {{ o.border }};background:{{ o.bg }};color:{{ o.color }};\">{{ o.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showNames }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;gap:10px;\">\n            <sc-for list=\"{{ players }}\" as=\"p\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex;gap:8px;align-items:center;\">\n                <input value=\"{{ p.val }}\" sc-camel-on-change=\"{{ p.onChange }}\" placeholder=\"{{ p.ph }}\" style=\"min-height:44px;border-radius:10px;border:2px solid {{ p.border }};background:#171109;color:#efe5d0;font-size:16px;padding:0 14px;box-sizing:border-box;flex:1;min-width:0;\">\n                <div style=\"display:flex;gap:6px;\">\n                  <sc-for list=\"{{ p.swatches }}\" as=\"sw\" hint-placeholder-count=\"4\">\n                    <button sc-camel-on-click=\"{{ sw.onPick }}\" title=\"{{ sw.name }}\" style=\"width:32px;height:32px;min-height:32px;border-radius:99px;border:3px solid {{ sw.ring }};background:{{ sw.c }};padding:0;\"><\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"font-size:13px;color:#8f7d5c;\">Relay mode: scribes take turns on a shared timer. Pick your ink color.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <div style=\"font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#a08d68;padding:0 2px;\">Choose a level to begin<\u002Fdiv>\n        <sc-for list=\"{{ levels }}\" as=\"lv\" hint-placeholder-count=\"4\">\n          <button sc-camel-on-click=\"{{ lv.onPick }}\" disabled=\"{{ lv.locke ound:{{ acc }};color:#1a130a;font-size:17px;font-weight:900;\">Continue →<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isResults }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Results\" style=\"width:100%;max-width:560px;display:flex;flex-direction:column;gap:18px;animation:pop .4s ease;padding-top:20px;\">\n      <div style=\"text-align:center;display:flex;flex-direction:column;gap:4px;\">\n        <div style=\"font-size:14px;letter-spacing:.2em;text-transform:uppercase;color:#a08d68;\">{{ rLevelName }} · round complete<\u002Fdiv>\n        <div style=\"font-size:64px;font-weight:900;color:#e0b45c;text-shadow:0 0 30px rgba(224,180,92,.4);\">{{ rScore }}<\u002Fdiv>\n        <div style=\"font-size:15px;color:#c9b992;\">points<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ unlockShow }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:rgba(224,180,92,.12);border:1px solid #e0b45c;border-radius:14px;padding:14px 18px;text-align:center;font-size:17px;font-weight:700;color:#e0b45c;animation:glow 2s ease-in-out infinite;\">{{ unlockMsg }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\">\n        <div style=\"background:#1d1610;border:1px solid #38290f;border-radius:12px;padding:14px;text-align:center;\">\n          <div style=\"font-size:28px;font-weight:900;color:#efe5d0;\">{{ rCorrect }}<span style=\"color:#8f7d5c;font-size:18px;\"> / {{ rAttempted }}<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13px;color:#a08d68;text-transform:uppercase;letter-spacing:.14em;\">correct<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#1d1610;border:1px solid #38290f;border-radius:12px;padding:14px;text-align:center;\">\n          <div style=\"font-size:28px;font-weight:900;color:#efe5d0;\">×{{ rStreak }}<\u002Fdiv>\n          <div style=\"font-size:13px;color:#a08d68;text-transform:uppercase;letter-spacing:.14em;\">best streak<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ teamShow }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#1d1610;border:1px solid #38290f;border-radius:12px;padding:14px 18px;display:flex;flex-direction:column;gap:8px;\">\n          <sc-for list=\"{{ teamRows }}\" as=\"r\" hint-placeholder-count=\"2\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;font-size:16px;\">\n              <span style=\"display:flex;align-items:center;gap:8px;font-weight:700;color:{{ r.color }};\"><span style=\"width:12px;height:12px;border-radius:99px;background:{{ r.color }};display:inline-block;\"><\u002Fspan>{{ r.name }}<\u002Fspan>\n              <span style=\"color:#c9b992;\">{{ r.line }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ hintShow }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;font-size:14px;color:#8f7d5c;\">Get 10 correct in one round to unlock the next level.<\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"display:flex;gap:10px;\">\n        <button sc-camel-on-click=\"{{ onReplay }}\" style=\"flex:1;min-height:54px;border-radius:12px;border:none;background:#e0b45c;color:#1a130a;font-size:19px;font-weight:900;\">Play again<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ onHome }}\" style=\"flex:1;min-height:54px;border-radius:12px;border:1px solid #4a3a20;background:transparent;color:#efe5d0;font-size:19px;font-weight:700;\">Levels<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n  \n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;roundSeconds&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 90, &quot;min&quot;: 30, &quot;max&quot;: 300, &quot;unit&quot;: &quot;s&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Gameplay&quot;}, &quot;unlockAll&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Gameplay&quot;}, &quot;showHints&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Gameplay&quot;}}\">\nclass Component extends DCLogic {\n  state = { screen: 'home', pc: 1, names: ['', '', ''], colors: [0, 1, 2], level: 1, best: {}, unlocked: 1,\n    q: null, typed: '', placed: [], time: 90, score: 0, streak: 0, bestStreak: 0,\n    correct: 0, attempted: 0, fb: null, endPending: false, playerIdx: 0, perPlayer: [], unlockedNow: false };\n  uid = 1;\n\n  PAL = [{name:'Gold',c:'#e0b45c'},{name:'Sky',c:'#7fb6d9'},{name:'Teal',c:'#6cc6ba'},{name:'Rose',c:'#e0908a'},{name:'Violet',c:'#b3a0dd'}];\n  D = {\n    um: {1:['אֶחָד','וְאֶחָד'],2:['שְׁנַיִם','וּשְׁנַיִם'],3:['שְׁלֹשָׁה','וּשְׁלֹשָׁה'],4:['אַרְבָּעָה','וְאַרְבָּעָה'],5:['חֲמִשָּׁה','וַחֲמִשָּׁה'],6:['שִׁשָּׁה','וְשִׁשָּׁה'],7:['שִׁבְעָה','וְשִׁבְעָה'],8:['שְׁמֹנָה','וּשְׁמֹנָה'],9:['תִּשְׁעָה','וְתִשְׁעָה'],10:['עֲשָׂרָה','וַעֲשָׂרָה']},\n    uf: {1:['אַחַת','וְאַחַת'],2:['שְׁתַּיִם','וּשְׁתַּיִם'],3:['שָׁלֹשׁ','וְשָׁלֹשׁ'],4:['אַרְבַּע','וְאַרְבַּע'],5:['חָמֵשׁ','וְחָמֵשׁ'],6:['שֵׁשׁ','וָשֵׁשׁ'],7:['שֶׁבַע','וְשֶׁבַע'],8:['שְׁמֹנֶה','וּשְׁמֹנֶה'],9:['תֵּשַׁע','וָתֵשַׁע'],10:['עֶשֶׂר','וָעֶשֶׂר']},\n    tm: {11:['אַחַד עָשָׂר','וְאַחַד עָשָׂר'],12:['שְׁנֵים עָשָׂר','וּשְׁנֵים עָשָׂר'],13:['שְׁלֹשָׁה עָשָׂר','וּשְׁלֹשָׁה עָשָׂר'],14:['אַרְבָּעָה עָשָׂר','וְאַרְבָּעָה עָשָׂר'],15:['חֲמִשָּׁה עָשָׂר','וַחֲמִשָּׁה עָשָׂר'],16:['שִׁשָּׁה עָשָׂר','וְשִׁשָּׁה עָשָׂר'],17:['שִׁבְעָה עָשָׂר','וְשִׁבְעָה עָשָׂר'],18:['שְׁמֹנָה עָשָׂר','וּשְׁמֹנָה עָשָׂר'],19:['תִּשְׁעָה עָשָׂר','וְתִשְׁעָה עָשָׂר']},\n    tf: {11:['אַחַת עֶשְׂרֵה','וְאַחַת עֶשְׂרֵה'],12:['שְׁתֵּים עֶשְׂרֵה','וּשְׁתֵּים עֶשְׂרֵה'],13:['שְׁלֹשׁ עֶשְׂרֵה','וּשְׁלֹשׁ עֶשְׂרֵה'],14:['אַרְבַּע עֶשְׂרֵה','וְאַרְבַּע עֶשְׂרֵה'],15:['חֲמֵשׁ עֶשְׂרֵה','וַחֲמֵשׁ עֶשְׂרֵה'],16:['שֵׁשׁ עֶשְׂרֵה','וְשֵׁשׁ עֶשְׂרֵה'],17:['שְׁבַע עֶשְׂרֵה','וּשְׁבַע עֶשְׂרֵה'],18:['שְׁמֹנֶה עֶשְׂרֵה','וּשְׁמֹנֶה עֶשְׂרֵה'],19:['תְּשַׁע עֶשְׂרֵה','וּתְשַׁע עֶשְׂרֵה']},\n    tens: {20:['עֶשְׂרִים','וְעֶשְׂרִים'],30:['שְׁלֹשִׁים','וּשְׁלֹשִׁים'],40:['אַרְבָּעִים','וְאַרְבָּעִים'],50:['חֲמִשִּׁים','וַחֲמִשִּׁים'],60:['שִׁשִּׁים','וְשִׁשִּׁים'],70:['שִׁבְעִים','וְשִׁבְעִים'],80:['שְׁמֹנִים','וּשְׁמֹנִים'],90:['תִּשְׁעִים','וְתִשְׁעִים']},\n    hunds: {100:['מֵאָה','וּמֵאָה'],200:['מָאתַיִם','וּמָאתַיִם'],300:['שְׁלֹשׁ מֵאוֹת','וּשְׁלֹשׁ מֵאוֹת'],400:['אַרְבַּע מֵאוֹת','וְאַרְבַּע מֵאוֹת'],500:['חֲמֵשׁ מֵאוֹת','וַחֲמֵשׁ מֵאוֹת'],600:['שֵׁשׁ מֵאוֹת','וְשֵׁשׁ מֵאוֹת'],700:['שְׁבַע מֵאוֹת','וּשְׁבַע מֵאוֹת'],800:['שְׁמֹנֶה מֵאוֹת','וּשְׁמֹנֶה מֵאוֹת'],900:['תְּשַׁע מֵאוֹת','וּתְשַׁע מֵאוֹת']},\n    thous: {1000:['אֶלֶף','וְאֶלֶף'],2000:['אַלְפַּיִם','וְאַלְפַּיִם'],3000:['שְׁלֹשֶׁת אֲלָפִים','וּשְׁלֹשֶׁת אֲלָפִים'],4000:['אַרְבַּעַת אֲלָפִים','וְאַרְבַּעַת אֲלָפִים'],5000:['חֲמֵשֶׁת אֲלָפִים','וַחֲמֵשֶׁת אֲלָפִים'],6000:['שֵׁשֶׁת אֲלָפִים','וְשֵׁשֶׁת אֲלָפִים'],7000:['שִׁבְעַת אֲלָפִים','וְשִׁבְעַת אֲלָפִים'],8000:['שְׁמֹנַת אֲלָפִים','וּשְׁמֹנַת אֲלָפִים'],9000:['תִּשְׁעַת אֲלָפִים','וְתִשְׁעַת אֲלָפִים']}\n  };\n  NOUNS = [\n    {he:'אִישׁ',pl:'אֲנָשִׁים',en:'men',g:'m'},{he:'יוֹם',pl:'יָמִים',en:'days',g:'m'},{he:'שֶׁקֶל',pl:'שְׁקָלִים',en:'shekels',g:'m'},\n    {he:'שָׁנָה',pl:'שָׁנִים',en:'years',g:'f'},{he:'נֶפֶשׁ',pl:'נְפָשׁוֹת',en:'souls',g:'f'},{he:'אַמָּה',pl:'אַמּוֹת',en:'cubits',g:'f'}];\n  LV = [\n    {n:1,name:'The Gate',he:'הַשַּׁעַר',range:'11–19',desc:'The teens — unit + עָשָׂר / עֶשְׂרֵה'},\n    {n:2,name:'The Courtyard',he:'הֶחָצֵר',range:'20–99',desc:'Tens and compound tens'},\n    {n:3,name:'The Wall',he:'הַחוֹמָה',range:'100–999',desc:'Hundreds with tens and units'},\n    {n:4,name:'The City',he:'הָעִיר',range:'1,000–9,999',desc:'Thousands — full census numbers'}\n  ];\n\n  ri(n){ return Math.floor(Math.random()*n); }\n  pick(a){ return a[this.ri(a.length)]; }\n  fmt(n){ return n.toLocaleString('en-US'); }\n  secs(){ return this.props.roundSeconds ?? 90; }\n  pCol(i){ return this.PAL[this.state.colors[i] ?? 0].c; }\n\n  mk(kind, val, g){\n    let pair;\n    if (kind==='unit') pair = (g==='m'?this.D.um:this.D.uf)[val];\n    else if (kind==='teen') pair = (g==='m'?this.D.tm:this.D.tf)[val];\n    else pair = this.D[kind][val];\n    return { kind, val, plain: pair[0], vav: pair[1] };\n  }\n  decompose(n, g){\n    const c = [];\n    const th = Math.floor(n/1000)*1000; if (th) c.push(this.mk('thous', th, g));\n    const h = Math.floor((n%1000)/100)*100; if (h) c.push(this.mk('hunds', h, g));\n    const r = n%100;\n    if (r>=11 && r<=19) c.push(this.mk('teen', r, g));\n    else if (r===10) c.push(this.mk('unit', 10, g));\n    else { const t = Math.floor(r/10)*10, u = r%10;\n      if (t) c.push(this.mk('tens', t, g));\n      if (u) c.push(this.mk('unit', u, g)); }\n    return c;\n  }\n  nounForm(lastComp, noun){\n    return (lastComp && lastComp.kind==='unit' && lastComp.val>=3) ? noun.pl : noun.he;\n  }\n  phrase(comps, noun){\n    const words = comps.map((c,i)=> i ? c.vav : c.plain).join(' ');\n    return noun ? words + ' ' + this.nounForm(comps[comps.length-1], noun) : words;\n  }\n  tail(){\n    const r = Math.random();\n    if (r<.2) return 0;\n    if (r<.4) return 1+this.ri(9);\n    if (r<.5) return 10;\n    if (r<.7) return (2+this.ri(8))*10;\n    if (r<.85) return (2+this.ri(8))*10 + 1+this.ri(9);\n    return 11+this.ri(9);\n  }\n  genN(level){\n    if (level===1) return 11+this.ri(9);\n    if (level===2) { const t=(2+this.ri(8))*10; return t + this.ri(10); }\n    if (level===3) return (1+this.ri(9))*100 + this.tail();\n    let n = (1+this.ri(9))*1000;\n    if (Math.random()<.7) n += (1+this.ri(9))*100;\n    return n + this.tail();\n  }\n  distract(c, g){\n    if (c.kind==='unit' || c.kind==='teen') return this.mk(c.kind, c.val, g==='m'?'f':'m');\n    const keys = Object.keys(this.D[c.kind]).map(Number).filter(v=>v!==c.val);\n    return this.mk(c.kind, this.pick(keys), g);\n  }\n  genQ(){\n    const level = this.state.level;\n    const noun = this.pick(this.NOUNS);\n    const n = this.genN(level);\n    const comps = this.decompose(n, noun.g);\n    const mode = Math.random()<.5 ? 'keypad' : 'build';\n    const q = { n, noun, comps, mode };\n    if (mode==='keypad') {\n      const order = Math.random()<.5 ? comps : comps.slice().reverse();\n      q.shown = this.phrase(order, noun);\n    } else {\n      let tiles = comps.map(c => ({...c}));\n      const ds = comps.map(c => this.distract(c, noun.g));\n      if (comps.length===1) {\n        const nb = comps[0].kind==='teen' ? this.mk('teen', comps[0].val===19?18:comps[0].val+1, noun.g) : this.distract(comps[0], noun.g);\n        if (!ds.some(d=>d.plain===nb.plain) && nb.plain!==comps[0].plain) ds.push(nb);\n      }\n      tiles = tiles.concat(ds.filter((d,i,a)=> a.findIndex(x=>x.plain===d.plain)===i && !comps.some(c=>c.plain===d.plain)));\n      tiles.forEach((t,i)=> t.id=i);\n      for (let i=tiles.length-1;i>0;i--){ const j=this.ri(i+1); [tiles[i],tiles[j]]=[tiles[j],tiles[i]]; }\n      q.tiles = tiles;\n    }\n    return q;\n  }\n\n  startRound(level){\n    clearInterval(this.iv); clearTimeout(this.ft);\n    const pc = this.state.pc;\n    const pt = pc>1 ? Math.max(10, Math.round(this.secs()/pc)) : this.secs();\n    const perPlayer = Array.from({length:pc}, (_,i)=>({ name: this.pName(i), color: this.pCol(i), c:0, a:0, t:pt }));\n    this.setState({ screen:'play', level, time:this.secs(), score:0, streak:0, bestStreak:0,\n      correct:0, attempted:0, fb:null, endPending:false, playerIdx:0, perPlayer, unlockedNow:false,\n      typed:'', placed:[], hintOpen:false, q:this.genQ() });\n    this.iv = setInterval(()=> this.tick(), 1000);\n  }\n  tick(){\n    const s = this.state;\n    if (s.fb) return;\n    if (s.pc===1){\n      const t = s.time-1;\n      if (t<=0){\n        clearInterval(this.iv);\n        if (s.fb && !s.fb.ok) this.setState({time:0, endPending:true});\n        else this.endRound();\n      } else this.setState({time:t});\n      return;\n    }\n    const idx = s.playerIdx;\n    if ((s.perPlayer[idx]||{}).t<=0) return;\n    const perPlayer = s.perPlayer.map((p,i)=> i===idx ? {...p, t:p.t-1} : p);\n    this.setState({perPlayer});\n    if (perPlayer[idx].t<=0 && !s.fb) this.nextQ();\n  }\n  endRound(){\n    clearInterval(this.iv); clearTimeout(this.ft);\n    const s = this.state;\n    const best = {...s.best};\n    if ((best[s.level]||0) < s.score) best[s.level] = s.score;\n    let unlocked = s.unlocked, unlockedNow = false;\n    if (s.correct>=10 && s.level===unlocked && unlocked<4){ unlocked++; unlockedNow = true; }\n    try { localStorage.setItem('bhnum_v1', JSON.stringify({best, unlocked})); } catch(e){}\n    this.setState({ screen:'results', best, unlocked, unlockedNow, fb:null, endPending:false, time:0 });\n  }\n  nextQ(){\n    const s = this.state;\n    if (s.screen!=='play') return;\n    if (s.pc===1){\n      if (s.endPending || s.time<=0) return this.endRound();\n      return this.setState({ fb:null, typed:'', placed:[], hintOpen:false, q:this.genQ() });\n    }\n    let next = -1;\n    for (let k=1;k<=s.pc;k++){ const i=(s.playerIdx+k)%s.pc; if (s.perPlayer[i].t>0){ next=i; break; } }\n    if (next===-1) return this.endRound();\n    this.setState({ fb:null, typed:'', placed:[], hintOpen:false, playerIdx:next, q:this.genQ() });\n  }\n  answer(ok, extraMsg){\n    const s = this.state;\n    if (s.fb) return;\n    const q = s.q;\n    const perPlayer = s.perPlayer.map((p,i)=> i===s.playerIdx ? {...p, c:p.c+(ok?1:0), a:p.a+1} : p);\n    const streak = ok ? s.streak+1 : 0;\n    const canonical = this.fmt(q.n) + '  =  ' + this.phrase(q.comps, q.noun);\n    const fb = ok\n      ? { ok:true, msg:'Correct! +' + (10 + 2*s.streak), answer: canonical }\n      : { ok:false, msg: extraMsg || 'Not quite.', answer: canonical };\n    this.setState({ fb, perPlayer, streak, bestStreak: Math.max(s.bestStreak, streak),\n      score: ok ? s.score + 10 + 2*s.streak : s.score,\n      correct: s.correct + (ok?1:0), attempted: s.attempted+1 });\n    if (ok) this.ft = setTimeout(()=> this.nextQ(), 2500);\n  }\n  submitKeypad(){\n    const t = this.state.typed;\n    if (!t || this.state.fb) return;\n    this.answer(parseInt(t,10) === this.state.q.n);\n  }\n  submitBuild(){\n    const s = this.state;\n    if (!s.placed.length || s.fb) return;\n    const q = s.q;\n    const words = [];\n    const junctionVav = [];\n    let structOk = true, lastWasVav = false;\n    s.placed.forEach((p,i)=>{\n      if (p.kind==='vav'){ if (i===0 || lastWasVav) structOk = false; lastWasVav = true; }\n      else { if (words.length>0) junctionVav.push(lastWasVav); words.push(p.tile); lastWasVav = false; }\n    });\n    if (lastWasVav) structOk = false;\n    if (words.length>=2 && !junctionVav[junctionVav.length-1]) structOk = false;\n    const need = q.comps.map(c=>c.plain).sort();\n    const got = words.map(t=>t.plain).sort();\n    const setsOk = need.length===got.length && need.every((v,i)=>v===got[i]);\n    let orderOk = words.length>0;\n    for (let i=1;i<words.length;i++){\n      const asc = words[1].val > words[0].val;\n      if (asc ? words[i].val <= words[i-1].val : words[i].val >= words[i-1].val) orderOk = false;\n    }\n    if (setsOk && orderOk && structOk) this.answer(true);\n    else if (setsOk && orderOk) this.answer(false, 'Right words — but וְ must come before the final part (classical style joins every part), and never lead, double, or trail.');\n    else if (setsOk) this.answer(false, 'Right words — but run smallest→largest or largest→smallest.');\n    else this.answer(false);\n  }\n  tapKey(k){\n    const s = this.state;\n    if (s.fb) return;\n    if (k==='⌫') this.setState({typed: s.typed.slice(0,-1)});\n    else if (k==='✓') this.submitKeypad();\n    else if (s.typed.length<5) this.setState({typed: s.typed + k});\n  }\n  tapBank(tile){\n    const s = this.state;\n    if (s.fb || s.placed.some(p=>p.kind==='word' && p.tile.id===tile.id)) return;\n    this.setState({placed: s.placed.concat({uid:this.uid++, kind:'word', tile})});\n  }\n  tapVav(){\n    if (this.state.fb) return;\n    this.setState({placed: this.state.placed.concat({uid:this.uid++, kind:'vav'})});\n  }\n  tapPlaced(uid){\n    if (this.state.fb) return;\n    this.setState({placed: this.state.placed.filter(p=>p.uid!==uid)});\n  }\n  pName(i){ return this.state.names[i].trim() || 'Scribe ' + (i+1); }\n\n  componentDidMount(){\n    try {\n      const saved = JSON.parse(localStorage.getItem('bhnum_v1') || 'null');\n      if (saved) this.setState({ best: saved.best||{}, unlocked: saved.unlocked||1 });\n    } catch(e){}\n    this.kd = (e)=>{\n      if (this.state.screen!=='play') return;\n      const fb = this.state.fb;\n      if (fb && !fb.ok){ if (e.key==='Enter') this.nextQ(); return; }\n      if (fb) return;\n      const q = this.state.q;\n      if (q.mode==='keypad'){\n        if (/^[0-9]$/.test(e.key)) this.tapKey(e.key);\n        else if (e.key==='Backspace') this.tapKey('⌫');\n        else if (e.key==='Enter') this.submitKeypad();\n      } else if (e.key==='Enter') this.submitBuild();\n    };\n    window.addEventListener('keydown', this.kd);\n  }\n  componentWillUnmount(){\n    clearInterval(this.iv); clearTimeout(this.ft);\n    window.removeEventListener('keydown', this.kd);\n  }\n\n  renderVals(){\n    const s = this.state;\n    const showHints = this.props.showHints ?? true;\n    const unlockAll = this.props.unlockAll ?? false;\n    const q = s.q || {};\n    const noun = q.noun || {};\n    const curT = s.pc===1 ? s.time : Math.max(0, (s.perPlayer[s.playerIdx]||{}).t ?? 0);\n    const denom = s.pc===1 ? this.secs() : Math.max(10, Math.round(this.secs()/s.pc));\n    const mm = Math.floor(curT/60), ss = curT%60;\n    const acc = (s.screen==='play' && s.pc>1) ? this.pCol(s.playerIdx) : '#e0b45c';\n    const mmss = (t)=> Math.floor(t/60) + ':' + String(t%60).padStart(2,'0');\n    const isFem = noun.g==='f';\n    const placedIds = new Set(s.placed.filter(p=>p.kind==='word').map(p=>p.tile.id));\n    const fb = s.fb || {};\n    const wordCount = s.placed.filter(p=>p.kind==='word').length;\n    return {\n      isHome: s.screen==='home', isPlay: s.screen==='play', isResults: s.screen==='results',\n      pcOpts: [1,2,3].map(n=>({\n        label: n===1 ? 'Solo' : n + ' scribes',\n        border: s.pc===n ? '#e0b45c' : '#4a3a20',\n        bg: s.pc===n ? '#e0b45c' : 'transparent',\n        color: s.pc===n ? '#1a130a' : '#c9b992',\n        onPick: ()=> this.setState({pc:n})\n      })),\n      showNames: s.pc>1,\n      players: Array.from({length:s.pc}, (_,i)=>({\n        val: s.names[i], ph: 'Scribe ' + (i+1) + ' — name',\n        border: this.pCol(i),\n        onChange: (e)=>{ const names=[...this.state.names]; names[i]=e.target.value; this.setState({names}); },\n        swatches: this.PAL.map((p,ci)=>({\n          c: p.c, name: p.name,\n          ring: s.colors[i]===ci ? '#efe5d0' : 'transparent',\n          onPick: ()=>{ const colors=[...this.state.colors]; colors[i]=ci; this.setState({colors}); }\n        }))\n      })),\n      levels: this.LV.map(lv=>{\n        const locked = !unlockAll && lv.n > s.unlocked;\n        return { ...lv, locked,\n          op: locked ? .38 : 1,\n          border: locked ? '#2b2113' : '#4a3a20',\n          anim: locked ? 'none' : 'glow 4s ease-in-out infinite',\n          bestText: locked ? '🔒' : (s.best[lv.n] ? 'best ' + s.best[lv.n] : ''),\n          onPick: ()=> !locked && this.startRound(lv.n)\n        };\n      }),\n      timeStr: mm + ':' + String(ss).padStart(2,'0'),\n      timeColor: curT<=10 ? '#d97757' : acc,\n      timePct: Math.max(0, Math.round(100*curT/denom)),\n      acc, accG1: acc+'2e', accG2: acc+'55', accSoft: acc+'24',\n      score: s.score, streak: s.streak, streakShow: s.streak>=2,\n      showPlayer: s.pc>1,\n      pChips: s.perPlayer.map((p,i)=>{\n        const active = i===s.playerIdx;\n        return { name: p.name, t: mmss(Math.max(0,p.t||0)),\n          bg: active ? p.color : 'transparent',\n          color: active ? '#1a130a' : (p.t>0 ? p.color : '#5c4f38'),\n          border: p.t>0 ? p.color : '#3a2f1c',\n          glow: active ? p.color+'55' : 'transparent' };\n      }),\n      onQuit: ()=> this.endRound(),\n      isKeypad: q.mode==='keypad', isBuild: q.mode==='build',\n      hebrewPhrase: q.shown || '',\n      hintOpen: !!s.hintOpen,\n      hintBtnShow: showHints && !s.hintOpen,\n      onHint: ()=> this.setState({hintOpen:true}),\n      nounLine: (noun.he||'') + ' · ' + (noun.en||'') + ' · ' + (isFem?'feminine':'masculine'),\n      nounHe: (noun.pl||'') , nounEn: (noun.en||'') + ' — plural of ' + (noun.he||''),\n      genderTag: isFem ? 'feminine' : 'masculine',\n      genderBg: isFem ? '#e0908a' : '#7fb6c9',\n      typedStr: s.typed ? this.fmt(parseInt(s.typed,10)) : '‸',\n      keys: ['1','2','3','4','5','6','7','8','9','⌫','0','✓'].map(k=>({\n        label:k, onTap:()=>this.tapKey(k),\n        bg: k==='✓' ? acc : '#241b10',\n        color: k==='✓' ? '#1a130a' : (k==='⌫' ? '#a08d68' : '#efe5d0'),\n        border: k==='✓' ? acc : '#4a3a20'\n      })),\n      targetStr: q.n ? this.fmt(q.n) : '',\n      placedEmpty: s.placed.length===0,\n      placed: s.placed.map(p=>({\n        label: p.kind==='vav' ? 'וְ' : p.tile.plain,\n        border: p.kind==='vav' ? acc : acc+'99',\n        color: p.kind==='vav' ? acc : '#f3e7c8',\n        onTap: ()=>this.tapPlaced(p.uid)\n      })),\n      onVav: ()=> this.tapVav(),\n      bank: (q.tiles||[]).map(t=>{\n        const used = placedIds.has(t.id);\n        return { label:t.plain, used, op: used ? .22 : 1, onTap:()=>this.tapBank(t) };\n      }),\n      checkDisabled: wordCount===0, checkOp: wordCount===0 ? .4 : 1,\n      onCheck: ()=> this.submitBuild(),\n      fbShow: !!s.fb, fbWait: !!s.fb && !fb.ok,\n      onContinue: ()=> this.nextQ(),\n      fbBg: fb.ok ? 'rgba(127,174,109,.12)' : 'rgba(217,119,87,.1)',\n      fbBorder: fb.ok ? '#7fae6d' : '#b05a4a',\n      fbColor: fb.ok ? '#a3c98f' : '#d99787',\n      fbMsg: fb.msg || '', fbAnswer: fb.answer || '',\n      rLevelName: (this.LV[s.level-1]||{}).name || '',\n      rScore: s.score, rCorrect: s.correct, rAttempted: s.attempted, rStreak: s.bestStreak,\n      unlockShow: s.unlockedNow,\n      unlockMsg: s.unlockedNow ? ((this.LV[s.unlocked-1]||{}).name || 'Next level') + ' is now open!' : '',\n      hintShow: s.screen==='results' && !s.unlockedNow && s.unlocked<4 && s.level===s.unlocked,\n      teamShow: s.pc>1,\n      teamRows: s.perPlayer.map(p=>({ name:p.name, color:p.color, line: p.c + ' / ' + p.a + ' correct' })),\n      onReplay: ()=> this.startRound(s.level),\n      onHome: ()=> this.setState({screen:'home'})\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
